name: Design proposal / RFC
description: Propose a larger design or architectural change.
title: "[RFC]: "
labels: ["type:design"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the design change in a few sentences.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed?
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Proposed design
      description: Include APIs, file formats, CLI behavior, or migration details.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and migration
      description: What could break and how should users migrate?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
