name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the research, teaching, or software-engineering need behind the request.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like ABMForge to provide?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core model/agent API
        - Scheduling/time
        - World/space
        - Scenario/experiment workflow
        - Dataset/archive/storage
        - Reproducibility/manifest
        - CLI
        - Documentation/examples
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds or related tools?
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: How would this improve research, teaching, reproducibility, or maintenance?
    validations:
      required: false
