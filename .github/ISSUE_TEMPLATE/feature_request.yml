name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or research workflow need
      description: What user or research problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you would like.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - core
        - experiment
        - archive
        - dataset
        - CLI
        - documentation
        - model zoo
        - packaging/release
        - performance
        - other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Explain who would benefit and how.
    validations:
      required: false
