name: Bug report
description: Report a reproducible problem in ABMForge
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ABMForge. Please include enough detail for maintainers to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducible example
      description: Provide the smallest code/configuration that reproduces the problem.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and traceback
      description: Paste the full error output or traceback.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ABMForge version
      placeholder: "0.3.0a1 or commit hash"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.10, 3.11, 3.12, or 3.13"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows, macOS, Linux"
    validations:
      required: true
  - type: textarea
    id: install
    attributes:
      label: Installation method
      description: How did you install ABMForge?
      placeholder: "source install, editable install, wheel, TestPyPI, PyPI"
    validations:
      required: true
