name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,viz,analysis,docs]"

      - name: Lint
        run: ruff check src tests examples

      - name: Format check
        run: ruff format --check src tests examples

      - name: Type check
        run: mypy --python-version ${{ matrix.python-version }} src

      - name: Tests with coverage
        run: pytest --cov=abmforge --cov-report=term-missing --cov-fail-under=70

      - name: Example smoke tests
        run: |
          python examples/wealth_model/run.py
          python examples/schelling/run.py
          python examples/sir_epidemic/run.py
          python examples/sugarscape/run.py
          python examples/parameter_sweep/run.py
          python examples/gis_space/run.py

      - name: Docs build
        run: mkdocs build --strict

      - name: Build package
        run: python -m build