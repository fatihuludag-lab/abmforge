name: TestPyPI Install Smoke

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: "Optional ABMForge version to install from TestPyPI, e.g. 0.3.0a1"
        required: false
        type: string

permissions:
  contents: read

jobs:
  testpypi-install-smoke:
    name: Install from TestPyPI and smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ABMForge from TestPyPI
        shell: bash
        run: |
          python -m pip install --upgrade pip

          package="abmforge"
          if [ -n "${{ inputs.package_version }}" ]; then
            package="abmforge==${{ inputs.package_version }}"
          fi

          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "$package"

      - name: Run installed-package smoke test
        shell: bash
        run: |
          cd /tmp
          python "$GITHUB_WORKSPACE/scripts/smoke_installed_package.py"
