name: Package Smoke

on:
  push:
  pull_request:

jobs:
  built-wheel-smoke:
    name: Built wheel smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Install built wheel in a clean virtual environment
        run: |
          python -m venv /tmp/abmforge-wheel-smoke
          /tmp/abmforge-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/abmforge-wheel-smoke/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/abmforge-wheel-smoke/bin/python "$GITHUB_WORKSPACE/scripts/smoke_installed_package.py"
