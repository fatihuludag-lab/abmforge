name: resource-template-experiment

model: model.model.ResourceTemplateModel

base_parameters:
  width: 25
  height: 25
  n_agents: 120
  initial_resource_mean: 6.0
  resource_capacity: 12.0
  energy_from_resource: 1.0
  initial_energy: 8.0
  vision_radius: 2

experiment:
  parameters:
    resource_regrowth: [0.15, 0.35, 0.60]
    metabolism: [0.9, 1.2]
    harvest_rate: [3.0, 5.0]
  seeds:
    count: 5
    master_seed: 20260625

run:
  steps: 60

outputs:
  primary_metric: mean_wealth
